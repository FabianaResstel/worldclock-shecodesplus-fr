<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>
    <title>World Clock</title>
</head>

<body>
    <div class="container">
        <h1>
            THE WORLD CLOCK
        </h1>
        <h2>Worldwide </h2>

        <select name="" id="select-city">

            <option value="">Select a city</option>
            <option value="current">My Location</option>
            <option value="Europe/Amsterdam">Amsterdam</option>
            <option value="America/Argentina/Buenos_Aires">Buenos Aires</option>
            <option value="America/Montreal">Montreal</option>

        </select>

        <div class="city" id="local-city">
            <div>
                <div class="cityName"></div>
                <div class="cityDate"></div>
            </div>
            <div class="timeDisplay">
                <div class="cityTime"> </div>

            </div>

        </div>

        <div class="city" id="los-angeles">
            <div>
                <div class="cityName">Los Angeles</div>
                <div class="cityDate"></div>
            </div>
            <div class="timeDisplay">
                <div class="cityTime"> </div>

            </div>

        </div>
        <div class="city" id="paris">
            <div>
                <div class="cityName">Paris</div>
                <div class="cityDate"></div>
            </div>
            <div class="timeDisplay">
                <div class="cityTime"> </div>

            </div>

        </div>



        <footer>
            This project was coded by Fabiana Resstel | <a href="#">GitHub | </a><a href="#">Netlify</a>
        </footer>
    </div>



    <script src="src/script.js"></script>
</body>

</html>
